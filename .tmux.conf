# --- Prefix ---
# Ctrl-a is easier to reach than Ctrl-b
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- General ---
set -g mouse on
set -g base-index 1              # windows start at 1, not 0
setw -g pane-base-index 1        # panes too
set -g renumber-windows on       # keep numbering contiguous
set -g escape-time 0             # no delay after Esc (critical for vim)
set -g history-limit 50000
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- Vim-style pane navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Vim-style pane resizing (repeatable) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Splits that make spatial sense ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- New windows inherit working directory ---
bind c new-window -c "#{pane_current_path}"

# --- Copy mode (vi keys) ---
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# --- Status bar (clean, minimal) ---
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=cyan,bold] #S "
set -g status-right "#[fg=yellow]%H:%M "
set -g status-left-length 30
setw -g window-status-current-style "fg=cyan,bold"
setw -g window-status-style "fg=#666666"

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded"
